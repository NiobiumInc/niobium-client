name: Update - niobium-fhetch Submodule

on:
  schedule:
    # Run at midnight PST (8:00 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    uses: ./.github/workflows/reusable-submodule-update.yml
    secrets: inherit
    with:
      submodule-path: vendor/niobium-fhetch
      submodule-name: niobium-fhetch
      submodule-org-repo: NiobiumInc/niobium-fhetch
      target-branch: main
