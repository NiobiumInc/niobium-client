name: Wheels

# Manual-only for now: pushing a branch with this file will NOT trigger a run.
# Add `push`/`pull_request`/tag triggers when the matrix is ready to run
# automatically. NOTE: a workflow_dispatch workflow is only runnable (Actions tab
# "Run workflow" / `gh workflow run`) once this file exists on the default branch.
#
# Every run builds + smoke-tests the wheels and uploads them as (short-lived) run
# artifacts for inspection. `publish: true`, run from a vX.Y.Z tag ref, additionally
# attaches the wheels + checksums to that tag's GitHub Release. This mirrors
# niobium-fhetch's runtime-release.yml. IMPORTANT: a GitHub Release is a staging/mirror
# point, NOT the `pip install` channel — `pip install niobium_sdk` resolves from PyPI,
# which is a separate, manual, gated step (see PYTHON_WHEEL_PLAN "Publishing to PyPI" and
# DISTRIBUTION_PLAN §8). Nothing publishes on push/tag automatically.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Attach the built wheels to the GitHub Release for the current tag ref"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Linux manylinux wheels — one native runner per arch (no emulation).
  #
  # cibuildwheel does everything inside the manylinux_2_28 container: the
  # CIBW before-all builds the OpenFHE substrate, then scikit-build-core builds
  # openfhe-python + libnbfhetch + niobium_session, and scripts/repair_wheel.sh
  # self-bundles the native deps (+ $ORIGIN rpaths) and retags manylinux. All
  # config lives in pyproject.toml [tool.cibuildwheel]; the host only needs Docker
  # (preinstalled on the runners).
  # ------------------------------------------------------------------
  wheels-linux:
    name: Wheels (${{ matrix.arch }}, manylinux)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest      # native x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm   # native arm64 (GitHub-hosted ARM runner)

    steps:
      # The recorder builds only against niobium-fhetch (OpenFHE fork +
      # openfhe-python + json, nested one level deeper), so init just that subtree
      # rather than a top-level --recursive: niobium-haze is a separate compiled
      # library (shipped via the niobium_ir package), unused here, and would pull
      # duplicate OpenFHE copies. The in-container build needs the fhetch sources.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Init build submodules (recorder = niobium-fhetch only; skip haze)
        run: git submodule update --init --recursive vendor/niobium-fhetch

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Build wheels
        uses: pypa/cibuildwheel@v3

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # macOS arm64 wheels — cibuildwheel builds on the host (no container) with the
  # python.org framework Pythons it installs. [tool.cibuildwheel.macos] builds the
  # substrate with MACOSX_DEPLOYMENT_TARGET=11.0 and repairs via
  # scripts/repair_wheel_macos.sh (delocate + @loader_path self-bundle).
  # (Intel macs: add a macos-13 runner for x86_64 wheels when needed.)
  # ------------------------------------------------------------------
  wheels-macos:
    name: Wheels (arm64, macOS)
    runs-on: macos-14   # Apple Silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Init build submodules (recorder = niobium-fhetch only; skip haze)
        run: git submodule update --init --recursive vendor/niobium-fhetch

      - name: Build wheels
        uses: pypa/cibuildwheel@v3

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # Python roundtrip (primary + fhetch_driver SECONDARY re-drive).
  #
  # cibuildwheel's test-command (wheel_smoke.py) is primary-only BY DESIGN:
  # fhetch_driver is a test tool that is NOT shipped in the wheel, so the isolated
  # test env can't run the secondary re-drive. The full Python roundtrip is a
  # dev-build test, so it runs here as its own job (not inside cibuildwheel) via the
  # committed `make test-python-release` — its test-fhetch-python-release leg
  # delegates to the niobium-fhetch submodule's roundtrip sweep, which builds
  # fhetch_driver (WITH_TESTS) and decrypts primary + secondary. One platform is
  # enough: the roundtrip logic is platform-independent (mirrors how ci.yml runs
  # test-client-release on ubuntu-latest only); the multi-platform wheel matrix is
  # for relocatability, which wheel_smoke.py already covers. Build steps + caching
  # mirror ci.yml.
  # ------------------------------------------------------------------
  python-roundtrip:
    name: Python roundtrip (primary + secondary, ubuntu-latest)
    if: github.repository == 'NiobiumInc/niobium-client'
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      OPENMP: OFF
      NATIVEOPT: OFF
      OPENFHE_ROOT: ${{ github.workspace }}/vendor/lib/openfhe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Init build submodules (recorder = niobium-fhetch only; skip haze)
        run: git submodule update --init --recursive vendor/niobium-fhetch

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache ninja-build python3-dev python3-venv
          python3 -m pip install --user 'pybind11>=3,<4'
          ccache --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ubuntu-latest-ccache-release-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h', 'Makefile', 'vendor/niobium-fhetch/Makefile') }}
          restore-keys: |
            ubuntu-latest-ccache-release-

      - name: Prime ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=2G
          ccache --zero-stats

      - name: Capture OpenFHE submodule commit
        id: openfhe_rev
        run: |
          cd vendor/niobium-fhetch/vendor/openfhe
          echo "rev=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore OpenFHE build
        uses: actions/cache@v4
        with:
          path: |
            vendor/lib/openfhe
            vendor/niobium-fhetch/vendor/openfhe/build
          key: ubuntu-latest-openfhe-release-${{ steps.openfhe_rev.outputs.rev }}
          restore-keys: |
            ubuntu-latest-openfhe-release-

      - name: Build OpenFHE
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          TARGETS_FILE="vendor/lib/openfhe/lib/OpenFHE/OpenFHETargets.cmake"
          if [ -f "$TARGETS_FILE" ] && grep -q "${{ github.workspace }}" "$TARGETS_FILE"; then
            echo "✓ OpenFHE cache valid for this workspace"
          else
            if [ -f "$TARGETS_FILE" ]; then
              echo "✗ OpenFHE cache has a stale workspace path — rebuilding"
              rm -rf vendor/lib/openfhe vendor/niobium-fhetch/vendor/openfhe/build
            fi
            make config-openfhe-release NATIVEOPT=${NATIVEOPT} OPENMP=${OPENMP}
            make build-openfhe-release
          fi

      # Assemble the wheel package tree and run the full Python parity suite,
      # including the fhetch_driver secondary re-drive. PYTHON is absolutized so the
      # submodule delegate (which cd's into vendor/niobium-fhetch) resolves it.
      - name: Run test-python-release (full parity incl. secondary)
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          export LD_LIBRARY_PATH="$OPENFHE_ROOT/lib:$LD_LIBRARY_PATH"
          make test-python-release PYTHON="$(command -v python3)"

  # ------------------------------------------------------------------
  # Gated publish: only on an explicit dispatch with publish=true, from a vX.Y.Z tag
  # ref. Collects every platform's wheels and attaches them + a SHA256SUMS to that tag's
  # GitHub Release. This is a durable, versioned MIRROR of the build outputs (and the
  # source for the separate PyPI upload / a `--find-links` manual install), NOT the
  # canonical channel: `pip install niobium_sdk` does not look here — it looks at PyPI.
  # See PYTHON_WHEEL_PLAN "Publishing to PyPI". Gated on python-roundtrip too, so a
  # stable publish never ships wheels whose Python parity (incl. secondary) failed.
  # ------------------------------------------------------------------
  release:
    name: Attach GitHub Release
    needs: [wheels-linux, wheels-macos, python-roundtrip]
    if: ${{ inputs.publish && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create/attach the Release for the tag
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheels-*
          merge-multiple: true
      - name: Checksums
        run: cd artifacts && sha256sum *.whl | tee SHA256SUMS
      - name: Attach wheels + checksums to the tag's Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.whl
            artifacts/SHA256SUMS
