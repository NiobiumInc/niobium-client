name: Update - fhe-application-design Submodule

on:
  repository_dispatch:
    types: [fhe_application_design_main_push]
  schedule:
    # Run at midnight PST (8:00 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    uses: ./.github/workflows/reusable-submodule-update.yml
    secrets: inherit
    with:
      submodule-path: .claude/skills/fhe-application-design
      submodule-name: fhe-application-design
      submodule-org-repo: NiobiumInc/fhe-application-design
      target-branch: main
