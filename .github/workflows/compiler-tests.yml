# .github/workflows/compiler-tests.yml
#
# Commit this (exact path/filename) to each of: niobium-fhetch, niobium-haze,
# niobium-client. The runner group `gcp-ephemeral` is pinned to this path
# @refs/heads/main, so the filename must match.
#
# ===========================================================================
# HARD REQUIREMENT: NO nbcc / compiler output in the public Actions log.
# Public repos => Actions logs AND artifacts are world-readable, with no per-job
# privacy toggle. So every compiler invocation sends stdout+stderr to /dev/null
# and we surface ONLY the exit status (PASS / FAIL). Debug failures locally.
# Do NOT: echo compiler output, `set -x`, upload trace artifacts, or print the
# SDK version. (A private Cloud Logging sink is available but OFF by default —
# see the commented block; enable only when you're comfortable with the trace
# leaving the runner.)
# ===========================================================================
#
# Runs on pull_request + push to main, in addition to workflow_dispatch.
# PR runs on a public-repo self-hosted runner are collaborator-gated by
# GitHub itself: first-time contributors require maintainer approval before
# any workflow touching self-hosted runners executes ("Require approval for
# first-time contributors" under Settings > Actions > General). Do not
# disable that setting as a side effect of this trigger.
# Never use pull_request_target with a checkout of the PR head.

name: compiler-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: the job only needs to read the repo for checkout. Minimizes
# the GITHUB_TOKEN scope on a public-repo self-hosted runner (don't widen this
# without cause).
permissions:
  contents: read

concurrency:
  group: compiler-tests-${{ github.ref }}
  # cancel-in-progress: true cancels in-flight runs on rapid PR pushes / rapid
  # pushes to main. Acceptable here — each run is a from-scratch VM anyway.
  cancel-in-progress: true

jobs:
  compiler-tests:
    name: Compiler tests (self-hosted, GCP)
    runs-on: [self-hosted, gcp-ephemeral]
    timeout-minutes: 60   # OpenFHE cold-build ~15 min + mult E2E
    env:
      SDK: /mnt/niobium-sdk/sdk   # mounted RO at boot by runner-startup.sh
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Verify SDK is mounted (no version printed)
        run: |
          test -x "$SDK/bin/nbcc_fhetch_replay" || { echo "::error::SDK not mounted"; exit 1; }

      - name: Install build tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Build client + fhetch (release)
        # Public C++/OpenFHE output — OK to show; useful for diagnosing build breaks.
        run: make release

      - name: Map the SDK into the layout the Makefile expects
        run: |
          # test-mult-target-release and test-mult-transport-release look for
          # $NIOBIUM_COMPILER_ROOT/build/nbcc_fhetch_replay[_server].
          # The SDK ships bin/ + lib/. Bridge with a shim of symlinks so the
          # replay binary's $ORIGIN rpath and the Makefile's LD_LIBRARY_PATH
          # ($ROOT/build) both resolve correctly through the symlinks.
          SHIM="$RUNNER_TEMP/nbcc-root"
          mkdir -p "$SHIM/build"
          ln -sf "$SDK"/bin/* "$SHIM/build/"
          ln -sf "$SDK"/lib/* "$SHIM/build/"
          test -x "$SHIM/build/nbcc_fhetch_replay" || { echo "::error::SDK missing nbcc_fhetch_replay"; exit 1; }
          echo "NIOBIUM_COMPILER_ROOT=$SHIM" >> "$GITHUB_ENV"
          echo "NIOBIUM_SPEC_DIR=$SDK/share/niobium/devices" >> "$GITHUB_ENV"
          echo "$SHIM/build" >> "$GITHUB_PATH"

      - name: E2E mult — target + transport (PASS/FAIL only, compiler output suppressed)
        run: |
          set +x
          rc=0
          make test-mult-target-release    TARGET=FUNC_SIM >/dev/null 2>&1 || rc=1
          make test-mult-transport-release                 >/dev/null 2>&1 || rc=1
          if [ $rc -eq 0 ]; then
            echo "compiler E2E: PASS"
          else
            echo "::error::compiler E2E FAILED (output suppressed by policy; reproduce locally)"
          fi
          exit $rc
